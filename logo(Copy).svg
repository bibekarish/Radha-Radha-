<svg width="200" height="200" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant Modern Gradient -->
    <linearGradient id="layerGrad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    
    <!-- Subtle, clean glow -->
    <filter id="cleanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#A855F7" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#cleanGlow)">
    <!-- Top Layer (Solid Stack) -->
    <path d="M12 2L3 6.5L12 11L21 6.5L12 2Z" fill="url(#layerGrad)" stroke="#E0CFFF" stroke-width="1" stroke-linejoin="round"/>
    
    <!-- Middle Layer Rim -->
    <path d="M3 11.5L12 16L21 11.5" stroke="url(#layerGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 11.5L12 16L21 11.5" stroke="#E0CFFF" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Bottom Layer Rim -->
    <path d="M3 16.5L12 21L21 16.5" stroke="url(#layerGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 16.5L12 21L21 16.5" stroke="#E0CFFF" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Sleek Inner Accent Line for Top Face Depth -->
  <path d="M12 3.5L5 7L12 10.5L19 7L12 3.5Z" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.4" stroke-linejoin="round"/>
</svg>
