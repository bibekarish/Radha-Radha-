```xml
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Segment Gradients -->
    <linearGradient id="blue-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <linearGradient id="purple-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b21a8" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <linearGradient id="pink-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#be185d" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="cyan-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Polished Metallic Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Central Off-White Matte Core Gradient -->
    <radialGradient id="core-grad" cx="45%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </radialGradient>

    <!-- Drop Shadows for 3D Layering -->
    <filter id="shadow-ring" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.45" />
    </filter>
    
    <filter id="shadow-core" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
    </filter>

    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#f59e0b" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Outer Orbiting Gold Dots -->
  <circle cx="422.2" cy="89.8" r="7" fill="url(#gold-grad)" filter="url(#gold-glow)" />
  <circle cx="89.8" cy="422.2" r="7" fill="url(#gold-grad)" filter="url(#gold-glow)" />

  <!-- Main Ring & Elements Group -->
  <g filter="url(#shadow-ring)">
    <!-- 1. Blue Segment -->
    <path d="M 94.5 284.5 A 164 164 0 0 1 298.4 97.6" fill="none" stroke="url(#blue-grad)" stroke-width="56" stroke-linecap="round" />

    <!-- 2. Purple Segment (Overlaps Blue) -->
    <path d="M 241.7 92.6 A 164 164 0 0 1 410.1 312.1" fill="none" stroke="url(#purple-grad)" stroke-width="56" stroke-linecap="round" />

    <!-- 3. Pink Segment (Overlaps Purple) -->
    <path d="M 420 256 A 164 164 0 0 1 186.7 404.6" fill="none" stroke="url(#pink-grad)" stroke-width="56" stroke-linecap="round" />

    <!-- 4. Cyan Segment (Overlaps Pink) -->
    <path d="M 241.7 419.4 A 164 164 0 0 1 101.9 199.9" fill="none" stroke="url(#cyan-grad)" stroke-width="56" stroke-linecap="round" />

    <!-- 5. Blue Overlap Arc (Re-drawn on top of Cyan to complete the endless basket-weave loop) -->
    <path d="M 94.5 284.5 A 164 164 0 0 1 114 174" fill="none" stroke="url(#blue-grad)" stroke-width="56" stroke-linecap="round" />

    <!-- Slanted Gold Accent Lines (Perfect radial tickmarks matching original placement) -->
    <g stroke="url(#gold-grad)" stroke-width="7.5" stroke-linecap="round" filter="url(#gold-glow)">
      <!-- Top-Right Accent (~315 degrees) -->
      <line x1="340.9" y1="171.1" x2="359.2" y2="152.8" />
      <!-- Bottom-Right Accent (~45 degrees) -->
      <line x1="340.9" y1="340.9" x2="359.2" y2="359.2" />
      <!-- Bottom-Left Accent (~135 degrees) -->
      <line x1="171.1" y1="340.9" x2="152.8" y2="359.2" />
    </g>
  </g>

  <!-- Center White Core Disc -->
  <g filter="url(#shadow-core)">
    <circle cx="256" cy="256" r="74" fill="url(#core-grad)" />
    
    <!-- Mathematically Centered Vector 'C' Path (Saves font dependencies) -->
    <path d="M 276.4 276.4 A 28 28 0 1 1 276.4 235.6" fill="none" stroke="#1d4ed8" stroke-width="9.5" stroke-linecap="round" />
  </g>
</svg>

